name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 24 : aligné sur l'environnement de dev. npm ci échouait
          # sur Node 20 (npm 10) — le package-lock est généré avec npm 11.
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm test
