# 🤖 Claude Code — répond aux mentions @claude dans les issues/PRs.
#
# Utilisé par le bouton « 💡 Demander une modif » du CRM : le CRM crée une
# issue GitHub mentionnant @claude → ce workflow lance Claude Code qui
# implémente la modification sur une branche et ouvre une PR. L'admin valide
# (merge) → Vercel déploie.
#
# ⚠️ Pré-requis (une seule fois, par l'admin du repo) :
#   1. Installer l'app GitHub « Claude » sur ce repo :
#      https://github.com/apps/claude  (ou `/install-github-app` dans Claude Code)
#   2. Ajouter le secret ANTHROPIC_API_KEY :
#      Settings → Secrets and variables → Actions → New repository secret
#   3. (Pour le bouton CRM) Ajouter sur Vercel la variable GITHUB_MODIF_TOKEN :
#      un fine-grained PAT limité à ce repo avec permission Issues: Read & write.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Toujours répondre en français + garde-fous du repo.
          claude_args: |
            --append-system-prompt "Réponds toujours en français. Lis CLAUDE.md et SUIVI.md avant de coder. Vérifie que npm run build passe avant de proposer la PR. Ne pousse jamais directement sur main."
